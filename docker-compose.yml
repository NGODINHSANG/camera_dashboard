version: '3.8'

services:
  # Go Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: camera-dashboard-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/dashboard.db
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      - CORS_ORIGINS=http://localhost,http://localhost:80,https://${DOMAIN:-localhost}
    volumes:
      - backend_data:/app/data
      - recordings_data:/app/recordings
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend with Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera-dashboard-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  backend_data:
    driver: local
  recordings_data:
    driver: local

networks:
  app-network:
    driver: bridge
