user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy cache for video files
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=video_cache:10m max_size=1g inactive=1h use_temp_path=off;

    # Upstream services
    upstream frontend {
        server camera-dashboard-frontend:80;
    }

    upstream backend {
        server camera-dashboard-backend:8080;
    }

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Video streaming with smart rate limiting
        # - First 5MB: full speed (instant playback start)
        # - After 5MB: rate limit to 512KB/s (bandwidth efficient)
        # - Range requests for seeking work normally
        location /api/recordings/files/stream {
            proxy_pass http://backend/api/recordings/files/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # Turn off buffering so Range requests work end-to-end
            proxy_buffering off;

            # Smart rate limiting:
            # First 2MB at full speed = instant playback start
            # Then limit to 768KB/s (6 Mbps) = enough for camera recordings (<5 Mbps)
            # Note: High bitrate uploads will buffer
            limit_rate_after 2m;
            limit_rate 768k;
        }

        # HLS recording playback - rate limit to prevent bandwidth burst
        # HLS.js downloads segments at max speed then pauses = bandwidth spikes
        # Rate limit smooths to steady ~3Mbps
        location /api/recordings/hls {
            proxy_pass http://backend/api/recordings/hls;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Giới hạn 768KB/s (~6Mbps) mỗi segment
            # Không dùng limit_rate_after vì segment ~1MB sẽ bypass limit hoàn toàn!
            limit_rate 768k;
        }

        # Live restream - FFmpeg generates HLS on-the-fly for instant playback
        location /api/recordings/restream {
            proxy_pass http://backend/api/recordings/restream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Rate limit: 768KB/s (6 Mbps) = enough for recordings (<5 Mbps)
            limit_rate 768k;
        }

        # Backend API (general)
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # MediaMTX HLS streams (live cameras)
        # Grid view: low bandwidth (~1Mbps) - just enough to show video
        location /hls/grid/ {
            rewrite ^/hls/grid/(.*)$ /$1 break;
            proxy_pass http://camera-mediamtx:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            # STRICT rate limit: 128KB/s (~1Mbps) per request
            limit_rate 128k;
        }

        # Fullscreen view: higher bandwidth for good quality
        location /hls/full/ {
            rewrite ^/hls/full/(.*)$ /$1 break;
            proxy_pass http://camera-mediamtx:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            # Rate limit: 768KB/s (~6Mbps) - enough for HD
            limit_rate 768k;
        }

        # HLS for internal recording (FFmpeg) - NO rate limit!
        # FFmpeg đọc HLS nội bộ (Docker network), không đi qua WAN
        # Rate limit sẽ làm FFmpeg tụt lại → segment bị xóa → 404!
        location /hls/record/ {
            rewrite ^/hls/record/(.*)$ /$1 break;
            proxy_pass http://camera-mediamtx:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Timeout dài cho recording stream dài
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            add_header Access-Control-Allow-Origin * always;
        }

        # Default HLS (fallback for browsers)
        location /hls/ {
            proxy_pass http://camera-mediamtx:8888/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            # Default rate limit for browsers
            limit_rate 256k;
        }

        # MediaMTX WebRTC (WHEP)
        location /webrtc/ {
            proxy_pass http://camera-mediamtx:8889/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Content-Type $content_type;

            # CORS for WHEP
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, DELETE" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;
            add_header Access-Control-Expose-Headers "Location" always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, DELETE" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;
                add_header Content-Length 0;
                return 204;
            }
        }

        # Socket.io for WebRTC signaling
        location /socket.io/ {
            proxy_pass http://camera-mediamtx:8889/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Frontend (Default - phải để cuối)
        location / {
            proxy_pass http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
