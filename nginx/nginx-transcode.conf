user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # HLS Cache
    proxy_cache_path /var/cache/nginx/hls
                     levels=1:2
                     keys_zone=hls_cache:100m
                     max_size=10g
                     inactive=24h;

    # Transcoded stream cache
    proxy_cache_path /var/cache/nginx/transcoded
                     levels=1:2
                     keys_zone=transcoded:100m
                     max_size=5g
                     inactive=12h;

    upstream ffmpeg_transcoder {
        server ffmpeg:8080;
    }

    server {
        listen 80;

        # LOW QUALITY stream (500kbps) - Giảm 75% băng thông
        location /stream/low/ {
            proxy_pass http://ffmpeg_transcoder/low/;
            proxy_cache transcoded;
            proxy_cache_valid 200 5s;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Quality "Low-500kbps";
            add_header Access-Control-Allow-Origin *;
        }

        # MEDIUM QUALITY stream (1Mbps) - Giảm 50% băng thông
        location /stream/medium/ {
            proxy_pass http://ffmpeg_transcoder/medium/;
            proxy_cache transcoded;
            proxy_cache_valid 200 5s;

            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Quality "Medium-1Mbps";
            add_header Access-Control-Allow-Origin *;
        }

        # ORIGINAL quality (bypass - 2Mbps)
        location /stream/original/ {
            proxy_pass http://ffmpeg_transcoder/original/;
            proxy_cache hls_cache;
            proxy_cache_valid 200 2s;

            add_header X-Quality "Original-2Mbps";
            add_header Access-Control-Allow-Origin *;
        }
    }
}
