user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/vnd.apple.mpegurl application/x-mpegurl;

    # HLS Cache configuration
    proxy_cache_path /var/cache/nginx/hls
                     levels=1:2
                     keys_zone=hls_cache:100m
                     max_size=10g
                     inactive=24h
                     use_temp_path=off;

    # Limit request rate
    limit_req_zone $binary_remote_addr zone=camera_limit:10m rate=50r/s;

    # Upstream camera servers (configure your camera IPs here)
    upstream camera_stream {
        # Example: Add your camera IPs
        # server 222.252.19.183:54542;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # HLS Proxy and Cache
        location ~ ^/hls/(.+\.(m3u8|ts))$ {
            # Rate limiting
            limit_req zone=camera_limit burst=100 nodelay;

            # Proxy settings
            proxy_pass http://$1;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Cache settings
            proxy_cache hls_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Cache .m3u8 playlist for 2 seconds
            proxy_cache_valid 200 2s;

            # Cache .ts segments for 1 hour
            proxy_cache_valid 404 10s;

            # Don't cache errors
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            # Add cache status header
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Timeout settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Direct proxy for camera streams (fallback)
        location /camera/ {
            limit_req zone=camera_limit burst=50 nodelay;

            proxy_pass http://camera_stream/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache for camera streams
            proxy_cache hls_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 5s;
            proxy_cache_use_stale error timeout updating;

            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin *;
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Cache status endpoint
        location /cache-status {
            access_log off;
            default_type text/plain;
            return 200 "Cache configuration active\n";
        }
    }
}
